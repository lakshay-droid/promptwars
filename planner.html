<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Meal Planner | CookMate AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM13 17H11V15H13V17ZM13 13H11V7H13V13Z" fill="#22C55E"/>
                </svg>
                <span>CookMate <span>AI</span></span>
            </div>
            <p class="subtitle">Plan your meals for today</p>
        </header>

        <!-- Stepper -->
        <div class="stepper">
            <div class="step-progress-bar" id="planner-progress"></div>
            <div class="step-node active" id="planner-node-1">B</div>
            <div class="step-node" id="planner-node-2">L</div>
            <div class="step-node" id="planner-node-3">D</div>
        </div>

        <main class="card" style="padding: 20px;">
            <h2 id="planner-title" style="margin-bottom: 4px; font-size: 20px;">What's for Breakfast?</h2>
            <p id="planner-description" style="font-size: 14px; color: var(--text-secondary); margin-bottom: 20px;">
                Choose one dish from your favorite options below.
            </p>

            <!-- Meal Cards Selection Container -->
            <div class="meal-selector" id="meal-cards-container">
                <!-- Meal options generated by JavaScript -->
            </div>
        </main>

        <footer style="display: flex; gap: 12px; margin-top: auto;">
            <button type="button" id="plan-prev-btn" class="btn btn-secondary" style="flex: 1; display: none;">
                Back
            </button>
            <button type="button" id="plan-next-btn" class="btn btn-primary" style="flex: 2;" disabled>
                Next Meal
            </button>
        </footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/planner.js"></script>
</body>
</html>
