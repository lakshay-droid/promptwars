<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taste Onboarding | CookMate AI</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM13 17H11V15H13V17ZM13 13H11V7H13V13Z" fill="#22C55E"/>
                </svg>
                <span>CookMate <span>AI</span></span>
            </div>
            <p class="subtitle">Personalize your taste preferences</p>
        </header>

        <!-- Stepper -->
        <div class="stepper">
            <div class="step-progress-bar" id="stepper-progress"></div>
            <div class="step-node active" id="step-node-1">1</div>
            <div class="step-node" id="step-node-2">2</div>
            <div class="step-node" id="step-node-3">3</div>
        </div>

        <main class="card">
            <h2 id="step-title" style="margin-bottom: 8px; font-size: 20px;">Favorite Breakfasts</h2>
            <p id="step-description" style="font-size: 14px; color: var(--text-secondary); margin-bottom: 16px;">
                Select at least 5 dishes you enjoy. We will recommend these for your daily planner.
            </p>
            
            <!-- Dishes Grid -->
            <div class="chips-grid" id="dishes-container">
                <!-- Chips will be dynamically generated by JS -->
            </div>

            <div class="onboarding-dish-count" id="dish-counter">
                Selected: <span id="selected-count">0</span> / 5 minimum
            </div>
        </main>

        <footer style="display: flex; gap: 12px; margin-top: auto;">
            <button type="button" id="prev-btn" class="btn btn-secondary" style="flex: 1; display: none;">
                Back
            </button>
            <button type="button" id="next-btn" class="btn btn-primary" style="flex: 2;" disabled>
                Next Step
            </button>
        </footer>
    </div>

    <script src="js/api.js"></script>
    <script src="js/onboarding.js"></script>
</body>
</html>
